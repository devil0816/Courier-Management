{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h3 class="card-title text-center mb-2">Forgot Password</h3>
      <p class="text-muted text-center mb-4">Enter your registered email address. We will send a 6-digit verification code to reset your password.</p>
      
      <form action="{{ url_for('forgot_password') }}" method="POST">
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" name="email" placeholder="example@mail.com" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Send Verification Code</button>
      </form>
      
      <div class="text-center mt-3">
        <p class="mb-0"><a href="{{ url_for('login') }}">Back to Login</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
