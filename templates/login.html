{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h3 class="card-title text-center mb-4">Partner Login</h3>
      <form action="{{ url_for('login') }}" method="POST">
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" name="email" placeholder="example@mail.com" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
          <div class="text-end mt-1">
            <a href="{{ url_for('forgot_password') }}" class="text-decoration-none text-muted" style="font-size: 0.85rem;">Forgot Password?</a>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
      <div class="text-center mt-3">
        <p class="mb-0">New partner? <a href="{{ url_for('register') }}">Create an account here</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
