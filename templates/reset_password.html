{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h3 class="card-title text-center mb-2">Create New Password</h3>
      <p class="text-muted text-center mb-4">Your code has been verified. Please set your new password below.</p>
      
      <form action="{{ url_for('reset_password') }}" method="POST">
        <div class="mb-3">
          <label for="password" class="form-label">New Password</label>
          <input type="password" class="form-control" id="password" name="password" placeholder="Enter new password" required>
        </div>
        <div class="mb-3">
          <label for="confirm_password" class="form-label">Confirm New Password</label>
          <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Update Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
